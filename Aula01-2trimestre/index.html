<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário HTML</title> <!--1 acertei-->
</head> <!--2 acertei-->

<body>
<h1>Cadastro de Usuário</h1> <!--3 acertei-->

<form action="cadastro.php" method="post"> <!--4 acertei-->

<label for="nome">Nome:</label>
<input type="text" id="nome" name="nome"> <!--5 acertei-->
<br>

<label for="email">E-mail:</label>
<input type="email" id="email" name="email"> <!--6 acertei-->
<br>

<label for="senha">Senha:</label>
<input type="password" id="senha" name="senha"> <!--7 acertei-->
<br>

<label for="idade">Idade:</label>
<input type="number" id="idade" name="idade">
<br>

<label for="nascimento">Data de nascimento:</label> <!--8 acertei-->
<input type="date" id="nascimento" name="nascimento"> <!--9 acertei-->
<br>

<p>Turno:</p>
<input type="radio" name="turno" id="manha" value="manha">
<label for="manha">Manhã</label>

<input type="radio" name="turno" id="tarde" value="tarde"> <!--10 acertei-->
<label for="tarde">Tarde</label><!--11 acertei-->

<input type="radio" name="turno" id="noite" value="noite">
<label for="noite">Noite</label>
<br>

<p>Áreas de interesse:</p>
<input type="checkbox" name="area" id="programacao" value="programacao"> <!--11 errei-->
<label for="programacao">Programação</label>

<input type="checkbox" name="area" id="design" value="design">
<label for="design">Design</label>

<input type="checkbox" name="area" id="redes" value="redes">
<label for="redes">Redes</label>
<br>

<input type="submit" value="Enviar"> <!--12 acertei-->
<input type="reset" value="Limpar"> <!--13 acertei-->

</form>
</body>
</html>
